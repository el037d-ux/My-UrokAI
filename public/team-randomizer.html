<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рандомайзер команд</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f7fb;
    min-height: 100vh;
    padding: 24px 16px 40px;
    color: #1e293b;
  }

  .app { max-width: 760px; margin: 0 auto; }

  h1 {
    text-align: center;
    font-size: 1.6em;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: #64748b; font-size: 0.92em; margin-bottom: 24px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #fff; border-radius: 14px; padding: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .tab-btn {
    flex: 1; padding: 10px 8px; border: none; border-radius: 10px; font-size: 0.88em; font-weight: 600;
    cursor: pointer; transition: all .2s; background: transparent; color: #64748b;
  }
  .tab-btn.active { background: #4f46e5; color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.3); }

  /* Card */
  .card { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }

  label { font-size: 0.85em; font-weight: 600; color: #475569; display: block; margin-bottom: 6px; }

  textarea {
    width: 100%; min-height: 140px; border: 1.5px solid #e2e8f0; border-radius: 12px;
    padding: 12px 14px; font-size: 0.93em; resize: vertical; outline: none; transition: border .2s;
    font-family: inherit; line-height: 1.6;
  }
  textarea:focus { border-color: #4f46e5; }

  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; }

  .field { flex: 1; min-width: 120px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 0.93em; outline: none; transition: border .2s; font-family: inherit;
  }
  .field input:focus, .field select:focus { border-color: #4f46e5; }

  .btn-primary {
    width: 100%; margin-top: 18px; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff;
    font-size: 1em; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .1s;
    box-shadow: 0 4px 14px rgba(79,70,229,.35);
  }
  .btn-primary:hover { opacity: .92; }
  .btn-primary:active { transform: scale(.98); }

  .btn-secondary {
    padding: 8px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    background: #fff; font-size: 0.85em; font-weight: 600; cursor: pointer;
    color: #475569; transition: all .2s;
  }
  .btn-secondary:hover { border-color: #4f46e5; color: #4f46e5; }

  /* Result */
  .result-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .result-title { font-size: 1.1em; font-weight: 700; color: #1e293b; }

  .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

  .team-card {
    border-radius: 16px; padding: 16px; border: 1.5px solid transparent;
    transition: transform .2s;
  }
  .team-card:hover { transform: translateY(-2px); }

  .team-title {
    font-size: 0.8em; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 10px; opacity: .75;
  }

  .member {
    display: flex; align-items: center; gap-px: 6px; padding: 6px 8px;
    border-radius: 8px; margin-bottom: 5px; font-size: 0.88em; font-weight: 500;
  }

  .role-badge {
    font-size: 0.72em; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    margin-left: auto; flex-shrink: 0; white-space: nowrap;
  }

  /* Picker result */
  .picker-result {
    text-align: center; padding: 32px 20px;
    animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .picker-name {
    font-size: 2.2em; font-weight: 900; color: #4f46e5;
    margin: 12px 0 8px; line-height: 1.2;
  }
  .picker-sub { color: #64748b; font-size: 0.9em; }

  .spinner-ring {
    width: 72px; height: 72px; border: 6px solid #e0e7ff;
    border-top-color: #4f46e5; border-radius: 50%; margin: 0 auto 16px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .names-count { font-size: 0.8em; color: #94a3b8; margin-top: 6px; }

  .empty-msg { text-align: center; padding: 32px; color: #94a3b8; font-size: 0.93em; }

  .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    background: #f1f5f9; border-radius: 20px; font-size: 0.82em; font-weight: 500; color: #475569;
  }
  .chip-del { cursor: pointer; color: #94a3b8; font-size: 1.1em; line-height: 1; }
  .chip-del:hover { color: #ef4444; }

  .options-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .toggle-btn {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0;
    font-size: 0.83em; font-weight: 600; cursor: pointer; transition: all .2s;
    background: #fff; color: #64748b;
  }
  .toggle-btn.on { background: #ede9fe; border-color: #7c3aed; color: #7c3aed; }

  .divider { height: 1px; background: #f1f5f9; margin: 16px 0; }

  @media (max-width: 500px) {
    .teams-grid { grid-template-columns: 1fr 1fr; }
    .picker-name { font-size: 1.7em; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>🎲 Рандомайзер команд</h1>
  <p class="subtitle">Разбей класс на команды или выбери участника для ответа</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('teams')">👥 Команды</button>
    <button class="tab-btn" onclick="switchTab('picker')">🎯 Выбрать одного</button>
  </div>

  <!-- TEAMS TAB -->
  <div id="tab-teams">
    <div class="card">
      <label>Список имён <span class="names-count" id="names-count"></span></label>
      <textarea id="names-input" placeholder="Введи имена через запятую, пробел или с новой строки:&#10;Аня, Боря, Вася&#10;Даша&#10;Женя Зина"></textarea>

      <div class="row">
        <div class="field">
          <label>Кол-во команд</label>
          <input type="number" id="team-count" value="3" min="2" max="20">
        </div>
        <div class="field">
          <label>Размер команды (макс)</label>
          <input type="number" id="team-size" value="" placeholder="авто" min="1" max="50">
        </div>
      </div>

      <div style="margin-top:14px;">
        <label>Роли в команде</label>
        <div class="options-row">
          <button class="toggle-btn on" id="role-speaker" onclick="toggleRole(this,'speaker')">🎤 Спикер</button>
          <button class="toggle-btn on" id="role-timer" onclick="toggleRole(this,'timer')">⏱ Таймкипер</button>
          <button class="toggle-btn on" id="role-creator" onclick="toggleRole(this,'creator')">💡 Креатор</button>
          <button class="toggle-btn" id="role-scribe" onclick="toggleRole(this,'scribe')">✍️ Секретарь</button>
          <button class="toggle-btn" id="role-leader" onclick="toggleRole(this,'leader')">👑 Лидер</button>
        </div>
      </div>

      <button class="btn-primary" onclick="generateTeams()">🎲 Разбить на команды</button>
    </div>

    <div id="teams-result" style="display:none;">
      <div class="card">
        <div class="result-header">
          <span class="result-title" id="teams-summary"></span>
          <button class="btn-secondary" onclick="generateTeams()">🔄 Перемешать</button>
        </div>
        <div class="teams-grid" id="teams-grid"></div>
      </div>
    </div>
  </div>

  <!-- PICKER TAB -->
  <div id="tab-picker" style="display:none;">
    <div class="card">
      <label>Список имён <span class="names-count" id="picker-names-count"></span></label>
      <textarea id="picker-input" placeholder="Введи имена через запятую, пробел или с новой строки"></textarea>

      <div style="margin-top: 14px;">
        <label>Убрать выбранных (не повторять)</label>
        <div class="chip-list" id="used-chips"></div>
      </div>

      <button class="btn-primary" onclick="pickOne()">🎯 Выбрать случайного</button>
      <button class="btn-secondary" style="width:100%; margin-top:10px; text-align:center;" onclick="resetUsed()">↺ Сбросить историю</button>
    </div>

    <div id="picker-result" style="display:none;">
      <div class="card">
        <div class="picker-result" id="picker-inner"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Утилиты ──────────────────────────────────────────────────────────────────
function parseNames(raw) {
  return raw.split(/[\n,;]+/).map(n => n.trim()).filter(Boolean);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Вкладки ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-teams').style.display = tab === 'teams' ? '' : 'none';
  document.getElementById('tab-picker').style.display = tab === 'picker' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'teams') || (i === 1 && tab === 'picker'));
  });
}

// ── Роли ──────────────────────────────────────────────────────────────────────
const ROLES = {
  speaker:  { label: '🎤 Спикер',     bg: '#ede9fe', color: '#7c3aed' },
  timer:    { label: '⏱ Таймкипер',  bg: '#dbeafe', color: '#2563eb' },
  creator:  { label: '💡 Креатор',    bg: '#fef3c7', color: '#d97706' },
  scribe:   { label: '✍️ Секретарь',  bg: '#dcfce7', color: '#16a34a' },
  leader:   { label: '👑 Лидер',      bg: '#fce7f3', color: '#db2777' },
};
const activeRoles = new Set(['speaker', 'timer', 'creator']);

function toggleRole(btn, role) {
  if (activeRoles.has(role)) { activeRoles.delete(role); btn.classList.remove('on'); }
  else { activeRoles.add(role); btn.classList.add('on'); }
}

// ── Цвета команд ─────────────────────────────────────────────────────────────
const TEAM_COLORS = [
  { bg: '#ede9fe', border: '#c4b5fd', title: '#7c3aed' },
  { bg: '#dbeafe', border: '#93c5fd', title: '#2563eb' },
  { bg: '#dcfce7', border: '#86efac', title: '#16a34a' },
  { bg: '#fef3c7', border: '#fcd34d', title: '#d97706' },
  { bg: '#fce7f3', border: '#f9a8d4', title: '#db2777' },
  { bg: '#e0f2fe', border: '#7dd3fc', title: '#0284c7' },
  { bg: '#f0fdf4', border: '#a7f3d0', title: '#059669' },
  { bg: '#fff7ed', border: '#fdba74', title: '#ea580c' },
];

function getColor(i) { return TEAM_COLORS[i % TEAM_COLORS.length]; }

// ── Генерация команд ──────────────────────────────────────────────────────────
function generateTeams() {
  const raw  = document.getElementById('names-input').value;
  const names = parseNames(raw);
  if (names.length < 2) { alert('Введите хотя бы 2 имени'); return; }

  let teamCount = parseInt(document.getElementById('team-count').value) || 3;
  const maxSize = parseInt(document.getElementById('team-size').value) || 0;

  if (maxSize > 0) teamCount = Math.ceil(names.length / maxSize);
  teamCount = Math.min(teamCount, names.length);

  const shuffled = shuffle(names);
  const teams = Array.from({ length: teamCount }, () => []);
  shuffled.forEach((name, i) => teams[i % teamCount].push(name));

  const roles = [...activeRoles];

  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';

  teams.forEach((members, ti) => {
    const c = getColor(ti);
    const roleAssign = shuffle(roles);

    const memberRows = members.map((name, mi) => {
      const role = roleAssign[mi];
      const roleMeta = role ? ROLES[role] : null;
      return `<div class="member" style="background:${c.bg}">
        <span>${name}</span>
        ${roleMeta ? `<span class="role-badge" style="background:${roleMeta.bg};color:${roleMeta.color}">${roleMeta.label}</span>` : ''}
      </div>`;
    }).join('');

    grid.innerHTML += `
      <div class="team-card" style="background:${c.bg};border-color:${c.border}">
        <div class="team-title" style="color:${c.title}">Команда ${ti + 1}</div>
        ${memberRows}
      </div>`;
  });

  document.getElementById('teams-summary').textContent =
    `${teams.length} команд · ${names.length} участников`;
  document.getElementById('teams-result').style.display = '';
}

// ── Пикер одного ─────────────────────────────────────────────────────────────
let usedNames = [];

function updateUsedChips() {
  const list = document.getElementById('used-chips');
  list.innerHTML = usedNames.map((n, i) => `
    <span class="chip">${n}<span class="chip-del" onclick="removeUsed(${i})">×</span></span>
  `).join('');
}

function removeUsed(i) { usedNames.splice(i, 1); updateUsedChips(); }
function resetUsed() { usedNames = []; updateUsedChips(); document.getElementById('picker-result').style.display = 'none'; }

function pickOne() {
  const raw   = document.getElementById('picker-input').value;
  const all   = parseNames(raw);
  const avail = all.filter(n => !usedNames.includes(n));

  const box  = document.getElementById('picker-result');
  const inner = document.getElementById('picker-inner');

  if (avail.length === 0) {
    inner.innerHTML = `<p style="color:#ef4444;font-weight:700">Все имена уже выбраны! Сбрось историю.</p>`;
    box.style.display = '';
    return;
  }

  // Анимация спиннера
  inner.innerHTML = `<div class="spinner-ring"></div><p style="color:#94a3b8">Выбираем...</p>`;
  box.style.display = '';

  setTimeout(() => {
    const picked = avail[Math.floor(Math.random() * avail.length)];
    usedNames.push(picked);
    updateUsedChips();

    const left = all.length - usedNames.length;
    inner.innerHTML = `
      <div style="font-size:2.8em">🎯</div>
      <div class="picker-name">${picked}</div>
      <div class="picker-sub">Отвечает на вопрос!</div>
      <div style="margin-top:14px;font-size:0.82em;color:#94a3b8">Осталось: ${left} из ${all.length}</div>
    `;
  }, 600);
}

// ── Счётчик имён ─────────────────────────────────────────────────────────────
function updateCount(inputId, countId) {
  const names = parseNames(document.getElementById(inputId).value);
  document.getElementById(countId).textContent = names.length ? `(${names.length})` : '';
}

document.getElementById('names-input').addEventListener('input', () => updateCount('names-input', 'names-count'));
document.getElementById('picker-input').addEventListener('input', () => updateCount('picker-input', 'picker-names-count'));
</script>
</body>
</html>
