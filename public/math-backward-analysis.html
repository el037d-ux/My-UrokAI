<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивный тренажер: Анализ с конца</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 650px;
            width: 100%;
            padding: 25px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        .progress-info {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #0056b3);
            width: 0%;
            transition: width 0.5s ease;
        }
        #question-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
            text-align: justify;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            border-radius: 4px;
        }
        .options {
            margin-bottom: 25px;
        }
        .option {
            display: block;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .option:hover {
            background-color: #eaf4ff;
            transform: translateX(2px);
        }
        .option input[type="radio"] {
            margin-right: 10px;
        }
        .buttons-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
        }
        #check-button {
            flex: 2;
            background-color: #007bff;
            color: white;
        }
        #check-button:hover { background-color: #0056b3; }
        #show-solution {
            flex: 1;
            background-color: #6c757d;
            color: white;
        }
        #show-solution:hover { background-color: #545b62; }
        .nav-button {
            padding: 10px 20px;
            background-color: #e9ecef;
            color: #333;
            border: 1px solid #ced4da;
        }
        .nav-button:hover:not(:disabled) { background-color: #d3d9df; }
        .nav-button:disabled { opacity: 0.5; cursor: not-allowed; }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .feedback.show { opacity: 1; }
        .feedback.correct { background-color: #d4edda; color: #155724; }
        .feedback.wrong   { background-color: #f8d7da; color: #721c24; }
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
            color: #856404;
            line-height: 1.6;
            display: none;
        }
        .explanation.show { display: block; }
        .explanation h3 { margin-top: 0; color: #856404; }
        .pseudocode {
            margin-top: 15px;
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9em;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.5;
            display: none;
        }
        .pseudocode.show { display: block; }
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .keyword { color: #66d9ef; }
        .number  { color: #ae81ff; }
        .comment { color: #75715e; font-style: italic; }
        .string  { color: #a6e22e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Тренажер: Анализ с конца</h1>
        <div class="progress-info">Задача <span id="current-task">1</span> из <span id="total-tasks">3</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

        <div id="task-container">
            <p id="question-text"></p>

            <div class="options" id="options-container"></div>

            <div class="buttons-row">
                <button id="check-button">Проверить ответ</button>
                <button id="show-solution">Показать решение</button>
            </div>

            <div id="result-message" class="feedback"></div>
            <div id="explanation-block" class="explanation"></div>
            <pre id="pseudocode-block" class="pseudocode"></pre>

            <div class="navigation">
                <button class="nav-button" id="prev-button">← Назад</button>
                <button class="nav-button" id="next-button">Вперёд →</button>
            </div>
        </div>
    </div>

<script>
const tasks = [
    {
        question: "У вас есть 9 монет, одна из которых фальшивая и легче остальных. Какое минимальное количество взвешиваний на чашечных весах без гирь нужно, чтобы гарантированно найти фальшивую монету?",
        options: [
            { value: "a", text: "Одно взвешивание" },
            { value: "b", text: "Два взвешивания" },
            { value: "c", text: "Три взвешивания" }
        ],
        correct: "b",
        explanation: "Идём с конца: на последнем шаге мы должны сравнить 3 монеты за одно взвешивание. Значит, за шаг до этого надо было оставить ровно 3 монеты. 9 монет делим на 3 группы по 3 — первое взвешивание оставляет нам одну из групп. Второе взвешивание находит фальшивку.",
        pseudocode:
`<span class="comment">// Анализ с конца: на последнем шаге ищем среди 3 монет</span>
<span class="keyword">function</span> findFake(coins):
    <span class="keyword">if</span> len(coins) == <span class="number">1</span>:
        <span class="keyword">return</span> coins[<span class="number">0</span>]

    <span class="comment">// Шаг назад: делим на 3 равные кучки</span>
    g1, g2, g3 = split(coins, <span class="number">3</span>)

    <span class="keyword">if</span> weight(g1) == weight(g2):
        target = g3
    <span class="keyword">else if</span> weight(g1) < weight(g2):
        target = g1
    <span class="keyword">else</span>:
        target = g2

    <span class="keyword">return</span> findFake(target)`
    },
    {
        question: "Крестьянин собрал яблоки и вышел из сада через 3 ворот. Каждому стражнику он отдавал половину имеющихся яблок плюс одно. После третьего стражника у него осталось 1 яблоко. Сколько яблок было изначально?",
        options: [
            { value: "a", text: "10 яблок" },
            { value: "b", text: "16 яблок" },
            { value: "c", text: "22 яблока" },
            { value: "d", text: "26 яблок" }
        ],
        correct: "c",
        explanation: "Классический анализ с конца. После 3-го стражника осталось 1 яблоко. Значит, ДО встречи с ним было (1 + 1) × 2 = 4. До 2-го стражника: (4 + 1) × 2 = 10. До 1-го стражника: (10 + 1) × 2 = 22. Изначально было 22 яблока.",
        pseudocode:
`<span class="comment">// Идём от конца к началу: обратная операция</span>
<span class="comment">// Если отдал половину+1, то осталось X/2 - 1</span>
<span class="comment">// Значит ДО было: (X + 1) * 2</span>

<span class="keyword">function</span> countApples(final_apples, guards):
    current = final_apples

    <span class="keyword">for</span> i <span class="keyword">from</span> <span class="number">1</span> <span class="keyword">to</span> guards:
        current = (current + <span class="number">1</span>) * <span class="number">2</span>

    <span class="keyword">return</span> current

<span class="comment">// Пример: countApples(1, 3) = 22</span>`
    },
    {
        question: "Улитка ползёт вверх по столбу высотой 10 метров. За день она поднимается на 3 метра, а за ночь сползает на 2 метра. За сколько дней улитка доберётся до вершины?",
        options: [
            { value: "a", text: "7 дней" },
            { value: "b", text: "8 дней" },
            { value: "c", text: "10 дней" },
            { value: "d", text: "12 дней" }
        ],
        correct: "b",
        explanation: "Смотрим с конца: в последний день улитка поднимается на 3 м и достигает верха, больше не сползая. Значит, перед этим утром она должна быть на высоте 10 − 3 = 7 м. Каждые сутки нетто она поднимается на 1 м. За 7 суток — 7 м. На 8-й день поднимается на 3 м и достигает вершины. Ответ: 8 дней.",
        pseudocode:
`<span class="comment">// Анализ с конца: последний рывок не имеет "отката"</span>
<span class="keyword">function</span> snailDays(height, day_climb, night_slip):
    target_before_last = height - day_climb

    <span class="keyword">if</span> target_before_last <= <span class="number">0</span>:
        <span class="keyword">return</span> <span class="number">1</span>

    net_per_day = day_climb - night_slip
    full_days = ceil(target_before_last / net_per_day)

    <span class="keyword">return</span> full_days + <span class="number">1</span>

<span class="comment">// Пример: snailDays(10, 3, 2) = 8</span>`
    }
];

let currentTaskIndex = 0;

const questionText     = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const resultMessage    = document.getElementById('result-message');
const explanationBlock = document.getElementById('explanation-block');
const pseudocodeBlock  = document.getElementById('pseudocode-block');
const currentTaskEl    = document.getElementById('current-task');
const totalTasksEl     = document.getElementById('total-tasks');
const progressFill     = document.getElementById('progress-fill');
const prevButton       = document.getElementById('prev-button');
const nextButton       = document.getElementById('next-button');

function renderTask(index) {
    const task = tasks[index];
    questionText.textContent = task.question;
    optionsContainer.innerHTML = '';
    task.options.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'option';
        label.innerHTML = `<input type="radio" name="answer" value="${opt.value}"> ${opt.text}`;
        optionsContainer.appendChild(label);
    });
    resultMessage.textContent = '';
    resultMessage.className = 'feedback';
    explanationBlock.classList.remove('show');
    pseudocodeBlock.classList.remove('show');
    currentTaskEl.textContent = index + 1;
    totalTasksEl.textContent  = tasks.length;
    progressFill.style.width  = ((index + 1) / tasks.length * 100) + '%';
    prevButton.disabled = (index === 0);
    nextButton.disabled = (index === tasks.length - 1);
}

document.getElementById('check-button').addEventListener('click', function() {
    const selected = document.querySelector('input[name="answer"]:checked');
    const task = tasks[currentTaskIndex];
    if (!selected) {
        resultMessage.textContent = '⚠️ Пожалуйста, выберите один из вариантов!';
        resultMessage.className = 'feedback wrong show';
        return;
    }
    if (selected.value === task.correct) {
        resultMessage.textContent = '✅ Верно! Отличная работа.';
        resultMessage.className = 'feedback correct show';
        showSolution();
    } else {
        resultMessage.textContent = '❌ Неверно. Подумайте ещё раз.';
        resultMessage.className = 'feedback wrong show';
    }
});

function showSolution() {
    const task = tasks[currentTaskIndex];
    explanationBlock.innerHTML = `<h3>📖 Пояснение:</h3><p>${task.explanation}</p>`;
    explanationBlock.classList.add('show');
    pseudocodeBlock.innerHTML  = task.pseudocode;
    pseudocodeBlock.classList.add('show');
}

document.getElementById('show-solution').addEventListener('click', showSolution);

prevButton.addEventListener('click', () => {
    if (currentTaskIndex > 0) { currentTaskIndex--; renderTask(currentTaskIndex); }
});
nextButton.addEventListener('click', () => {
    if (currentTaskIndex < tasks.length - 1) { currentTaskIndex++; renderTask(currentTaskIndex); }
});

renderTask(0);
</script>
</body>
</html>
